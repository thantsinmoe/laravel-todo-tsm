name: Deploy to Prod
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Deploy to server
        uses: garygrossgarten/github-action-ssh@v0.1.4
        with:
          command: "echo 'Connection successful!'"
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          port: 22
          timeout: "120s"
          script: "cd /home/ubuntu/devops && ./deploy.sh"
        
        
